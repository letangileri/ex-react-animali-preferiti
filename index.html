<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I miei animali Preferiti</title>
  <link rel="stylesheet" href="style.css">
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <!-- React DOM -->
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const ListaAnimali = () => {
      const animals = ['gatto', 'cane', 'pappagallo', 'Trudigna']
      return (
        <details>
          <summary>Animali</summary>
          <ul>
            {animals.map((a, i) => (
              <li key={i}>{a}</li>
            ))}
          </ul>
        </details>
      )
    }
  </script>
  <!--Montare il componente-->
  <script type="text/babel">
    const { createRoot } = ReactDOM;
    const listaAnimaliDiv = document.querySelector('.lista-animali')
    const root = createRoot(listaAnimaliDiv)
    root.render(<ListaAnimali />)
  </script>
</head>

<body>
  <header>
    <h1>I miei animali Preferiti</h1>
  </header>
  <main>
    <figure>
      <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
    </figure>
    <div class="lista-animali"></div>
  </main>
  <footer>
    <p>Creato con amore da... un collega sbadato! 🐾</p>
  </footer>
</body>

</html>

<!-- 📌 Milestone 1: Inserire un Componente React
Monta un componente React all’interno dell’elemento con classe .lista-animali.

Il componente deve includere:
Un elemento <details> con titolo "Animali", che contiene:
Una lista <ul> statica che viene creata a partire da un array di stringhe (animals) dove ciascuna stringa rappresenta il nome di un animale.

Obiettivo: Mostrare la struttura base della lista di animali con un <details> che può essere espanso o contratto. -->
