<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I miei animali Preferiti</title>
  <link rel="stylesheet" href="style.css">
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <!-- React DOM -->
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState } = React;

    function Modal({
      title,
      content,
      show = false,
      onClose = () => { },
      onConfirm = () => { }
    }) {
      return show && ReactDOM.createPortal(
        <div className="modal-container">
          <div className="modal">
            <h2>{title}</h2>
            <p>{content}</p>
            <div>
              <button onClick={onClose}>Annulla</button>
              <button onClick={onConfirm}>Conferma</button>
            </div>
          </div>
        </div>,
        document.body
      )
    }



    const ListaAnimali = () => {
      const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];

      const [animals, setAnimals] = useState([]);

      const [show, setShow] = useState(false)

      const [animalName, setAnimalName] = useState('')

      const addAnimal = () => {
        if (!animalName) return;
        setAnimals(curr => [...curr, animalName])
        setAnimalName('')
        setShow(false)
        // const randomIndex = Math.floor(Math.random() * animalsChoices.length);
        // const randomAnimal = animalsChoices[randomIndex];
        // setAnimals(curr => [...curr, randomAnimal]);
      }

      return (<>
        <button onClick={() => setShow(true)}>Aggiungi animale casuale</button>
        <details>
          <summary>Animali</summary>
          <ul>
            {animals.map((a, i) => (
              <li key={i}>{a}</li>
            ))}
          </ul>
        </details>
        <Modal
          show={show}
          onClose={() => setShow(false)}
          onConfirm={addAnimal}
          title="Aggiungi animale"
          content={
            <input
              type="text"
              value={animalName}
              onChange={e => setAnimalName(e.target.value)}
            />
          }
        />
      </>)
    }
  </script>
  <!--Montare il componente-->
  <script type="text/babel">
    const { createRoot } = ReactDOM;
    const listaAnimaliDiv = document.querySelector('.lista-animali')
    const root = createRoot(listaAnimaliDiv)
    root.render(<ListaAnimali />)
  </script>




</head>

<body>
  <header>
    <h1>I miei animali Preferiti</h1>
  </header>
  <main>
    <figure>
      <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
    </figure>
    <div class="lista-animali"></div>
  </main>
  <footer>
    <p>Creato con amore da... un collega sbadato! 🐾</p>
  </footer>
</body>

</html>
